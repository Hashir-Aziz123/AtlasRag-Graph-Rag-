
services:
  # Relational Database & Source of Truth
  postgres:
    image: postgres:16-alpine
    container_name: graphrag_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: graphrag_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Vector Database
  qdrant:
    image: qdrant/qdrant:v1.9.1
    container_name: graphrag_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # Knowledge Graph Database
  neo4j:
    image: neo4j:5.21.0-enterprise
    container_name: graphrag_neo4j
    environment:
      - NEO4J_AUTH=neo4j/anothersecretpassword
      - NEO4J_PLUGINS=["apoc"] # Advanced Pathing Operations Community plugin
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
    ports:
      - "7474:7474" # HTTP Browser interface
      - "7687:7687" # Bolt protocol for python driver
    volumes:
      - neo4j_data:/data
      - neo4j_plugins:/plugins

  # Message Broker for Celery
  redis:
    image: redis:7.2-alpine
    container_name: graphrag_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  qdrant_data:
  neo4j_data:
  neo4j_plugins: